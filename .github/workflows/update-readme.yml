name: Update README
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Content
        run: |
          # Criando o conteúdo que será injetado
          echo "### 📂 Meus Repositórios em Destaque" > content.md
          echo "" >> content.md
          echo "* **[learning_js_serverless](https://github.com/leo-albergaria/learning_js_serverless)**: Arquitetura baseada em eventos (AWS Lambda/Node.js)." >> content.md
          echo "* **[learning_html_dsa_power_bi](https://github.com/leo-albergaria/learning_html_dsa_power_bi)**: Business Intelligence e visualização de dados." >> content.md

      - name: Inject Content
        run: |
          # Verifica se as tags existem no arquivo
          if grep -q "" readme.md; then
            sed -i '//,//{
              //r content.md
              //!{
                //!d
              }
            }' readme.md
          else
            echo "Erro: As tags de injeção não foram encontradas no arquivo readme.md"
            exit 1
          fi
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./README.md
          git commit -m "docs: auto-update repository list" || exit 0
          git push
