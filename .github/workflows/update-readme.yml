name: Update README Dynamic Content
on:
  schedule:
    - cron: '0 0 * * *' # Executa diariamente à meia-noite
  workflow_dispatch:    # Permite execução manual a qualquer momento

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para permitir que o script edite o arquivo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Inject Repositories List
        uses: teoxoy/profile-readme-stats@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Esta action irá preencher automaticamente os campos
          # entre <!-- START_SECTION:repositories --> e <!-- END_SECTION:repositories -->
