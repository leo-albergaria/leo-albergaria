name: Update README

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Content
        run: |
          echo "### 📂 Meus Repositórios em Destaque" > content.md
          echo "" >> content.md
          echo "* **[learning_js_serverless](https://github.com/leo-albergaria/learning_js_serverless)**: Arquitetura baseada em eventos utilizando AWS Lambda, Node.js e conceitos Serverless." >> content.md
          echo "* **[learning_html_dsa_power_bi](https://github.com/leo-albergaria/learning_html_dsa_power_bi)**: Estudos envolvendo HTML, análise de dados, Data Science e visualização com Power BI." >> content.md
          echo "* **[wallet_ts_api_previsao_do_tempo](https://github.com/leo-albergaria/wallet_ts_api_previsao_do_tempo)**: Aplicação TypeScript com integração de API externa e consumo de serviços REST." >> content.md
          echo "* **[learning_java_app_ponto_de_acesso](https://github.com/leo-albergaria/learning_java_app_ponto_de_acesso)**: Aplicação Java para estudo de orientação a objetos, regras de negócio e desenvolvimento backend." >> content.md
          echo "* **[wallet__ocaml_schoolwork_mini_python](https://github.com/leo-albergaria/wallet__ocaml_schoolwork_mini_python)**: Exploração de diferentes paradigmas de programação utilizando OCaml e Python." >> content.md
          echo "* **[angular_projects](https://github.com/leo-albergaria)**: Projetos frontend utilizando Angular, TypeScript e desenvolvimento de interfaces modernas." >> content.md
          echo "* **[java_spring_projects](https://github.com/leo-albergaria)**: Projetos backend utilizando Java, Spring Framework e padrões aplicados em sistemas corporativos." >> content.md
          echo "* **[oracle_plsql_projects](https://github.com/leo-albergaria)**: Desenvolvimento envolvendo banco Oracle, PL/SQL, procedures, packages e soluções corporativas." >> content.md
          echo "* **[docker_projects](https://github.com/leo-albergaria)**: Estudos e aplicações utilizando containers Docker para padronização de ambientes." >> content.md
          echo "* **[microservices_projects](https://github.com/leo-albergaria)**: Estudos relacionados a arquitetura distribuída, APIs e microsserviços." >> content.md
          echo "* **[rest_api_projects](https://github.com/leo-albergaria)**: Implementações de APIs REST e integração entre aplicações." >> content.md
          echo "* **[database_projects](https://github.com/leo-albergaria)**: Projetos envolvendo modelagem, persistência e integração com bancos de dados." >> content.md
          echo "* **[cloud_projects](https://github.com/leo-albergaria)**: Experimentos e estudos relacionados a computação em nuvem e serviços gerenciados." >> content.md
          echo "* **[data_engineering_projects](https://github.com/leo-albergaria)**: Projetos envolvendo processamento, integração e organização de dados." >> content.md
          echo "* **[automation_projects](https://github.com/leo-albergaria)**: Scripts e automações para otimização de processos de desenvolvimento." >> content.md
          echo "* **[react_projects](https://github.com/leo-albergaria)**: Estudos de desenvolvimento frontend utilizando React e tecnologias do ecossistema JavaScript." >> content.md
          echo "* **[frontend_ui_projects](https://github.com/leo-albergaria)**: Projetos relacionados a interfaces web, componentes reutilizáveis e experiência do usuário." >> content.md
          echo "* **[mongodb_projects](https://github.com/leo-albergaria)**: Estudos utilizando banco NoSQL MongoDB e integração com aplicações." >> content.md
          echo "* **[jasper_reports_projects](https://github.com/leo-albergaria)**: Desenvolvimento de relatórios e soluções de geração de documentos empresariais." >> content.md
          echo "* **[wildfly_jboss_projects](https://github.com/leo-albergaria)**: Estudos envolvendo servidores de aplicação Java Enterprise." >> content.md
          echo "* **[integration_projects](https://github.com/leo-albergaria)**: Projetos de integração entre sistemas, APIs e serviços." >> content.md
          echo "* **[agile_projects](https://github.com/leo-albergaria)**: Estudos e práticas relacionadas a métodos ágeis e organização de equipes." >> content.md
          echo "* **[architecture_projects](https://github.com/leo-albergaria)**: Projetos focados em arquitetura de software, padrões e boas práticas." >> content.md
          echo "* **[devops_projects](https://github.com/leo-albergaria)**: Estudos envolvendo automação, pipelines e práticas DevOps." >> content.md
          echo "* **[software_engineering_projects](https://github.com/leo-albergaria)**: Projetos relacionados à engenharia de software, qualidade e evolução de sistemas." >> content.md

      - name: Inject Content
        run: |
          if grep -q "<!-- START_REPOSITORIES -->" readme.md && grep -q "<!-- END_REPOSITORIES -->" readme.md; then

            sed -i '/<!-- START_REPOSITORIES -->/,/<!-- END_REPOSITORIES -->/{ 
              /<!-- START_REPOSITORIES -->/{
                p
                r content.md
              }
              /<!-- END_REPOSITORIES -->/!d
            }' readme.md

          else
            echo "Erro: As tags de injeção não foram encontradas no README.md"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add readme.md
          git commit -m "docs: auto-update repository list" || exit 0
          git push
