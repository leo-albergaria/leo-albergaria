name: Update README

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Content
        run: |
          echo "### 📂 Meus Repositórios em Destaque" > content.md
          echo "" >> content.md
          echo "* **[learning_js_serverless](https://github.com/leo-albergaria/learning_js_serverless)**: Arquitetura baseada em eventos (AWS Lambda/Node.js)." >> content.md
          echo "* **[learning_html_dsa_power_bi](https://github.com/leo-albergaria/learning_html_dsa_power_bi)**: Business Intelligence e visualização de dados." >> content.md

      - name: Inject Content
        run: |
          if grep -q "<!-- START_REPOSITORIES -->" readme.md && grep -q "<!-- END_REPOSITORIES -->" readme.md; then

            sed -i '/<!-- START_REPOSITORIES -->/,/<!-- END_REPOSITORIES -->/{ 
              /<!-- START_REPOSITORIES -->/{
                p
                r content.md
              }
              /<!-- END_REPOSITORIES -->/!d
            }' readme.md

          else
            echo "Erro: As tags de injeção não foram encontradas no README.md"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add readme.md
          git commit -m "docs: auto-update repository list" || exit 0
          git push
