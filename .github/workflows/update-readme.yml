name: Update README
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # A estratégia correta aqui é usar um script próprio ou uma 
      # versão autorizada (whitelisted) da action.
      # Se a organização bloqueia actions externas, você deve usar
      # apenas scripts locais.
      - name: Generate Content
        run: |
          # Aqui você executa um script que processa seus repositórios
          # Exemplo simples de injeção:
          echo "### Meus Repositórios" > content.md
          # Adicione lógica de leitura de repositórios aqui
          
      - name: Update README
        run: |
          sed -i '//,//{
            //r content.md
            //!{
              //!d
            }
          }' README.md
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update dynamic repositories list" || exit 0
          git push
